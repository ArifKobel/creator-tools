name: Golang-App-Workflow
'on':
  push:
    branches:
      - main
jobs:
  build-GoAppliation:
    runs-on: ubuntu-latest

    steps:
      
      - name: Checkout-Repository
        uses: actions/checkout@v4

      - name: Setup-Golang
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'
          check-latest: true
      - run: go version

      - name: Install-Golang-Dependencies
        run: go mod download

      - name: Build-Golang-App
        run: GOOS=linux go build -o build/main -v

      - name: Display-Build-Golang-App
        run: ls -R build/

      - name: Create-Env-File
        run: |
          echo "DB_HOST=${{ secrets.DB_HOST }}" > build/.env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> build/.env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> build/.env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> build/.env
          echo "DB_USER=${{ secrets.DB_USER }}" >> build/.env
          echo "DEEPGRAM_API_KEY=${{ secrets.DEEPGRAM_API_KEY }}" >> build/.env
          echo "FFMPEG_PATH=${{ secrets.FFMPEG_PATH }}" >> build/.env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> build/.env
          echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> build/.env
          echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" >> build/.env
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> build/.env
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> build/.env

      - name: Copy-Build-Golang-App
        uses: appleboy/scp-action@master
        with:
          host: '${{ secrets.VM_HOST }}'
          username: '${{ secrets.VM_USERNAME }}'
          key: '${{ secrets.VM_SSH_KEY }}'
          port: '${{ secrets.VM_SSH_PORT }}'
          source: build/
          target: /var/www/vhosts/api.creator-tools.kobel.click

      - name: Deploy-Build-Golang-App-To-Ubuntu-VM
        uses: appleboy/ssh-action@master
        with:
          host: '${{ secrets.VM_HOST }}'
          username: '${{ secrets.VM_USERNAME }}'
          key: '${{ secrets.VM_SSH_KEY }}'
          port: '${{ secrets.VM_SSH_PORT }}'
          script: |
            cd /var/www/vhosts/api.creator-tools.kobel.click
            ls -l
            sudo systemctl reload nginx
            sudo systemctl status nginx            
